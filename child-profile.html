<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DTC — Perfil del Niño</title>
  <style>
    :root {
      --bg-1: #050816;
      --bg-2: #0a1020;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.12);
      --text: #f3f6fb;
      --muted: #b3bfd3;
      --accent: #3b82f6;
      --shadow: 0 18px 48px rgba(0,0,0,.34);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(59,130,246,.16), transparent 30%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
    }

    body {
      padding: 20px 14px 40px;
    }

    .page {
      width: min(100%, 1100px);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .hero, .card {
      border-radius: var(--radius-xl);
      padding: 22px;
    }

    .hero {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 18px;
      align-items: center;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 26px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.02;
      letter-spacing: -.04em;
    }

    .hero p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .card h2 {
      font-size: 1.5rem;
      margin-bottom: 14px;
      letter-spacing: -.02em;
    }

    .info-list {
      display: grid;
      gap: 12px;
    }

    .info-item {
      border-radius: var(--radius-md);
      padding: 14px 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
    }

    .label {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .value {
      font-size: 1rem;
      font-weight: 600;
    }

    .memories {
      display: grid;
      gap: 12px;
    }

    .memory {
      border-radius: var(--radius-lg);
      padding: 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
    }

    .memory-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 8px;
    }

    .memory h3 {
      font-size: 1.08rem;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(59,130,246,.16);
      border: 1px solid rgba(59,130,246,.28);
      font-size: .82rem;
      color: #dbeafe;
      white-space: nowrap;
    }

    .memory p {
      color: var(--muted);
      line-height: 1.55;
    }

    .memory small {
      display: block;
      margin-top: 10px;
      color: #d8e4ff;
      opacity: .8;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 14px 18px;
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      border-color: rgba(59,130,246,.55);
      box-shadow:
        inset 0 0 0 1px rgba(59,130,246,.25),
        0 0 0 2px rgba(59,130,246,.08);
    }

    .status {
      min-height: 24px;
      color: #d8e4ff;
      font-weight: 600;
      margin-top: 10px;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .hero {
        grid-template-columns: 70px 1fr;
      }
      .avatar {
        width: 70px;
        height: 70px;
        border-radius: 20px;
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero glass">
      <div class="avatar" id="childAvatar">E</div>
      <div>
        <h1 id="childName">Perfil del Niño</h1>
        <p id="childSubtitle">Cargando información…</p>
      </div>
    </section>

    <section class="grid">
      <article class="card glass">
        <h2>Información</h2>
        <div class="info-list">
          <div class="info-item">
            <div class="label">Fecha de nacimiento</div>
            <div class="value" id="childDob">—</div>
          </div>
          <div class="info-item">
            <div class="label">Aula</div>
            <div class="value" id="childClassroom">—</div>
          </div>
          <div class="info-item">
            <div class="label">Alergias</div>
            <div class="value" id="childAllergies">—</div>
          </div>
          <div class="info-item">
            <div class="label">Notas médicas</div>
            <div class="value" id="childMedical">—</div>
          </div>
          <div class="info-item">
            <div class="label">Ingreso</div>
            <div class="value" id="childEnrollment">—</div>
          </div>
        </div>
      </article>

      <article class="card glass">
        <h2>Memorias</h2>
        <div class="actions">
          <button class="btn btn-primary" id="addMemoryBtn">Agregar memoria</button>
        </div>
        <p class="status" id="memoryStatus"></p>
        <div class="memories" id="memoriesList"></div>
      </article>
    </section>
  </main>

  <script type="module">
    import { supabase } from "./core/supabase.js";

    const ORGANIZATION_ID = "b11a6b48-8f83-4737-8e3d-4b79a15a178c";
    const CHILD_ID = "1095c76d-3ab9-4960-96df-23381def3862";

    const childName = document.getElementById("childName");
    const childSubtitle = document.getElementById("childSubtitle");
    const childAvatar = document.getElementById("childAvatar");
    const childDob = document.getElementById("childDob");
    const childClassroom = document.getElementById("childClassroom");
    const childAllergies = document.getElementById("childAllergies");
    const childMedical = document.getElementById("childMedical");
    const childEnrollment = document.getElementById("childEnrollment");
    const memoriesList = document.getElementById("memoriesList");
    const memoryStatus = document.getElementById("memoryStatus");
    const addMemoryBtn = document.getElementById("addMemoryBtn");

    async function loadChildProfile() {
      const db = supabase();

      const { data, error } = await db
        .from("children")
        .select("*")
        .eq("organization_id", ORGANIZATION_ID)
        .eq("id", CHILD_ID)
        .single();

      if (error || !data) {
        childName.textContent = "No se pudo cargar el perfil";
        childSubtitle.textContent = error?.message || "Perfil no encontrado";
        return;
      }

      const fullName =
        data.full_name ||
        [data.first_name, data.last_name].filter(Boolean).join(" ") ||
        "Niño";

      childName.textContent = fullName;
      childSubtitle.textContent = "Perfil central del niño en DTC";
      childAvatar.textContent = (fullName || "N").charAt(0).toUpperCase();

      childDob.textContent = data.date_of_birth || "—";
      childClassroom.textContent = data.classroom || "—";
      childAllergies.textContent = data.allergies || "Sin registro";
      childMedical.textContent = data.medical_notes || "Sin notas";
      childEnrollment.textContent = data.enrollment_date || "—";
    }

    async function loadMemories() {
      const db = supabase();

      const { data, error } = await db
        .from("child_memories")
        .select("*")
        .eq("organization_id", ORGANIZATION_ID)
        .eq("child_id", CHILD_ID)
        .order("captured_at", { ascending: false });

      if (error) {
        memoryStatus.textContent = error.message || "No se pudieron cargar las memorias";
        return;
      }

      const rows = data || [];

      if (!rows.length) {
        memoriesList.innerHTML = "<div class='memory'><p>No hay memorias guardadas todavía.</p></div>";
        return;
      }

      memoriesList.innerHTML = rows.map(row => `
        <article class="memory">
          <div class="memory-top">
            <h3>${row.title}</h3>
            <span class="tag">${row.memory_type}</span>
          </div>
          <p>${row.description || "Sin descripción."}</p>
          <small>${new Date(row.captured_at).toLocaleString()}</small>
        </article>
      `).join("");
    }

    async function addTestMemory() {
      memoryStatus.textContent = "Guardando memoria...";

      const db = supabase();

      const { error } = await db
        .from("child_memories")
        .insert([
          {
            organization_id: ORGANIZATION_ID,
            child_id: CHILD_ID,
            memory_type: "activity",
            title: "Actividad especial",
            description: "Emma participó con alegría en una actividad creativa.",
            media_type: "none",
            milestone_type: "art_activity",
            share_with_guardians: true
          }
        ]);

      if (error) {
        memoryStatus.textContent = error.message || "No se pudo guardar la memoria";
        return;
      }

      memoryStatus.textContent = "Memoria guardada correctamente.";
      await loadMemories();
    }

    addMemoryBtn?.addEventListener("click", addTestMemory);

    await loadChildProfile();
    await loadMemories();
  </script>
</body>
</html>
