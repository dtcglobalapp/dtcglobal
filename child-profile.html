  function formatDate(value) {
    if (!value) return "—";
    try {
      return new Date(value).toLocaleDateString("es-US", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    } catch {
      return value;
    }
  }

  function formatDateTime(value) {
    if (!value) return "—";
    try {
      return new Date(value).toLocaleString("es-US", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    } catch {
      return value;
    }
  }

  function yesNo(value) {
    if (value === true) return "Sí";
    if (value === false) return "No";
    return "—";
  }

  function prettyEnum(value) {
    if (!value) return "—";
    return String(value)
      .replaceAll("_", " ")
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function setListEmpty(el, text) {
    el.innerHTML = `<div class="empty-state">${text}</div>`;
  }

  function activateTab(tab) {
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tab === tab);
    });

    document.querySelectorAll(".panel").forEach(panel => {
      panel.classList.remove("active");
    });

    const target = document.getElementById(`panel-${tab}`);
    if (target) target.classList.add("active");
  }

  document.getElementById("tabsNav")?.addEventListener("click", (e) => {

    if (!btn) return;
    activateTab(btn.dataset.tab);

    if (data.profile_photo_url) {

    if (error) {
