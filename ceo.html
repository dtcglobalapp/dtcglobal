<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DTC · Panel CEO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body{ margin:0; background:#0b0f14; color:#e8eef7; }
    header{ padding:16px 18px; border-bottom:1px solid #1b2430; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .brand b{ font-size:18px; }
    .muted{ color:#9fb0c6; }
    .wrap{ display:grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 64px); }
    @media (max-width: 980px){ .wrap{ grid-template-columns:1fr; } }
    .panel{ border-right:1px solid #1b2430; padding:14px; }
    @media (max-width: 980px){ .panel{ border-right:none; border-bottom:1px solid #1b2430; } }
    .card{ background:#101722; border:1px solid #1b2430; border-radius:14px; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    .row{ display:flex; gap:10px; align-items:center; }
    .col{ display:flex; flex-direction:column; gap:10px; }
    button{ padding:10px 12px; border-radius:10px; border:1px solid #2b3a55; background:#182235; color:#e8eef7; cursor:pointer; }
    button.primary{ background:#2b6cff; border-color:#2b6cff; }
    button.danger{ background:#ff3b3b; border-color:#ff3b3b; }
    button.ghost{ background:transparent; }
    button:disabled{ opacity:.5; cursor:not-allowed; }
    input, select, textarea{
      width:100%; padding:10px 11px; border-radius:10px;
      border:1px solid #263246; background:#0c121b; color:#e8eef7; outline:none;
    }
    textarea{ min-height:90px; resize:vertical; }
    .tabs{ display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .tab{ padding:8px 10px; border-radius:10px; border:1px solid #2b3a55; background:#0c121b; cursor:pointer; }
    .tab.active{ background:#182235; border-color:#2b6cff; }
    .list{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
    .item{ padding:10px; border:1px solid #1b2430; border-radius:12px; background:#0e1622; cursor:pointer; }
    .item.active{ border-color:#2b6cff; box-shadow: 0 0 0 3px rgba(43,108,255,.15); }
    .tiny{ font-size:12px; color:#9fb0c6; }
    .hr{ height:1px; background:#1b2430; margin:12px 0; }
    .badge{ display:inline-flex; gap:6px; align-items:center; font-size:12px; padding:3px 8px; border-radius:999px; border:1px solid #2b3a55; color:#cfe0ff; }
    .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media (max-width: 980px){ .grid2{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header>
  <div class="brand">
    <b>DTC · Panel CEO</b><br/>
    <span class="muted">Centro de control global</span>
  </div>
  <div class="row">
    <span id="who" class="badge">…</span>
    <button id="btnBack" class="ghost">Volver</button>
    <button id="btnLogout" class="ghost">Salir</button>
  </div>
</header>

<div class="wrap">
  <aside class="panel">
    <div class="card">
      <div class="tabs">
        <div id="tabOrgs" class="tab active">Socios</div>
        <div id="tabFlags" class="tab">Flags</div>
        <div id="tabBacklog" class="tab">Backlog</div>
        <div id="tabCEOs" class="tab">CEOs</div>
      </div>

      <input id="search" placeholder="Buscar organización..." />
      <div id="list" class="list"></div>
      <div id="listMsg" class="tiny muted"></div>
    </div>
  </aside>

  <main style="padding:14px;">
    <div class="card">
      <div id="viewTitle" style="font-size:18px; font-weight:800;">Socios</div>
      <div class="tiny muted" id="viewSub">Selecciona una organización para ver detalles.</div>

      <div class="hr"></div>

      <div id="viewOrgs">
        <div class="grid2">
          <div class="col">
            <label class="tiny muted">Nombre</label>
            <input id="org_name" placeholder="Nombre organización" />
            <label class="tiny muted">Plan</label>
            <select id="org_plan">
              <option value="basic">basic</option>
              <option value="pro">pro</option>
              <option value="premium">premium</option>
            </select>
            <label class="tiny muted">Status</label>
            <select id="org_status">
              <option value="trial">trial</option>
              <option value="active">active</option>
              <option value="past_due">past_due</option>
              <option value="canceled">canceled</option>
            </select>
          </div>
          <div class="col">
            <label class="tiny muted">Employee limit (opcional)</label>
            <input id="org_emp_limit" type="number" min="0" />
            <label class="tiny muted">Current period end (opcional)</label>
            <input id="org_period_end" type="date" />
            <label class="tiny muted">Notas internas</label>
            <textarea id="org_notes" placeholder="Notas del CEO..."></textarea>
          </div>
        </div>

        <div class="hr"></div>
        <div class="row" style="justify-content:space-between;">
          <div class="tiny muted" id="orgMeta">—</div>
          <div class="row">
            <button id="btnSaveOrg" class="primary" disabled>Guardar cambios</button>
          </div>
        </div>
        <div class="tiny" id="orgMsg"></div>
      </div>

      <div id="viewFlags" style="display:none;">
        <div class="grid2">
          <div class="col">
            <label class="tiny muted">Scope</label>
            <select id="flag_scope">
              <option value="global">global</option>
              <option value="org">org</option>
            </select>
            <label class="tiny muted">Flag key</label>
            <input id="flag_key" placeholder="ej: menus_module" />
          </div>
          <div class="col">
            <label class="tiny muted">Enabled</label>
            <select id="flag_enabled">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
            <label class="tiny muted">Notas</label>
            <input id="flag_notes" placeholder="Notas..." />
          </div>
        </div>
        <div class="row" style="justify-content:space-between; margin-top:12px;">
          <div class="tiny muted">Si scope=org, usa la organización seleccionada.</div>
          <button id="btnUpsertFlag" class="primary" disabled>Guardar flag</button>
        </div>
        <div class="hr"></div>
        <div id="flagsList" class="list"></div>
        <div class="tiny" id="flagMsg"></div>
      </div>

      <div id="viewBacklog" style="display:none;">
        <div class="grid2">
          <div class="col">
            <label class="tiny muted">Título</label>
            <input id="b_title" placeholder="Ej: Autocomplete emails..." />
            <label class="tiny muted">Módulo</label>
            <input id="b_module" placeholder="Employees, Menus, Billing..." />
          </div>
          <div class="col">
            <label class="tiny muted">Prioridad</label>
            <select id="b_priority">
              <option value="low">low</option>
              <option value="medium" selected>medium</option>
              <option value="high">high</option>
              <option value="critical">critical</option>
            </select>
            <label class="tiny muted">Estado</label>
            <select id="b_status">
              <option value="idea">idea</option>
              <option value="design">design</option>
              <option value="build">build</option>
              <option value="test">test</option>
              <option value="shipped">shipped</option>
            </select>
          </div>
        </div>

        <label class="tiny muted" style="margin-top:10px; display:block;">Descripción</label>
        <textarea id="b_desc" placeholder="Describe la idea..."></textarea>

        <div class="row" style="justify-content:space-between; margin-top:12px;">
          <div class="tiny muted">Tu libreta vive aquí.</div>
          <button id="btnAddBacklog" class="primary">Agregar</button>
        </div>

        <div class="hr"></div>
        <div id="backlogList" class="list"></div>
        <div class="tiny" id="backlogMsg"></div>
      </div>

      <div id="viewCEOs" style="display:none;">
        <div class="tiny muted" style="border:1px solid #2b3a55; background:#0c141f; padding:12px; border-radius:12px;">
          Para promover a CEO, la persona debe registrarse primero.
        </div>

        <div class="grid2" style="margin-top:10px;">
          <div class="col">
            <label class="tiny muted">Email</label>
            <input id="ceo_email" placeholder="email@domain.com" />
          </div>
          <div class="col">
            <label class="tiny muted">Nombre (opcional)</label>
            <input id="ceo_name" placeholder="Nombre" />
          </div>
        </div>

        <div class="row" style="justify-content:flex-end; margin-top:10px;">
          <button id="btnPromoteCEO" class="primary">Promover a CEO</button>
        </div>

        <div class="hr"></div>
        <div id="ceoList" class="list"></div>
        <div class="tiny" id="ceoMsg"></div>
      </div>

    </div>
  </main>
</div>

<script>
  const SUPABASE_URL = "https://mugufzwvwteoopjdrheq.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_npn2NhS9fEHAjWHGsbLTSQ_KudyqrFt";

  const noLock = async (...args) => {
    const fn = args[args.length - 1];
    if (typeof fn === "function") return await fn();
    return null;
  };

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true, storageKey:"dtc-ceo-auth", lock:noLock }
  });

  const $ = (id) => document.getElementById(id);
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  let session=null;
  let orgs=[];
  let selectedOrg=null;

  function setTab(activeId){
    ["tabOrgs","tabFlags","tabBacklog","tabCEOs"].forEach(id => $(id).classList.toggle("active", id===activeId));
    $("viewOrgs").style.display = activeId==="tabOrgs" ? "" : "none";
    $("viewFlags").style.display = activeId==="tabFlags" ? "" : "none";
    $("viewBacklog").style.display = activeId==="tabBacklog" ? "" : "none";
    $("viewCEOs").style.display = activeId==="tabCEOs" ? "" : "none";
  }

  $("tabOrgs").onclick = () => { setTab("tabOrgs"); refreshOrgs(); };
  $("tabFlags").onclick = () => { setTab("tabFlags"); refreshFlags(); };
  $("tabBacklog").onclick = () => { setTab("tabBacklog"); refreshBacklog(); };
  $("tabCEOs").onclick = () => { setTab("tabCEOs"); refreshCEOs(); };

  $("btnBack").onclick = () => location.href = "app.html";
  $("btnLogout").onclick = async () => { await sb.auth.signOut(); location.href="app.html"; };

  async function requireCEO(){
    const { data } = await sb.auth.getSession();
    session = data.session;
    if(!session){ alert("Debes iniciar sesión primero."); location.href="app.html"; return false; }

    const { data: role, error } = await sb.rpc("get_my_global_role");
    if(error){ alert("Error leyendo rol global: " + error.message); return false; }
    if(role !== "ceo"){
      alert("Acceso denegado. Solo rol global 'ceo'.");
      location.href="app.html";
      return false;
    }

    $("who").textContent = (session.user.email || "—") + " · ceo";
    return true;
  }

  function renderOrgList(){
    const q = ($("search").value || "").toLowerCase().trim();
    const filtered = orgs.filter(o => String(o.name||"").toLowerCase().includes(q));
    $("list").innerHTML = filtered.map(o => {
      const active = selectedOrg?.id === o.id ? "active" : "";
      return `
        <div class="item ${active}" data-id="${o.id}">
          <div style="font-weight:800;">${escapeHtml(o.name||"—")}</div>
          <div class="tiny muted">${escapeHtml(o.plan)} · ${escapeHtml(o.subscription_status)} · limit:${escapeHtml(o.employee_limit)}</div>
        </div>
      `;
    }).join("");

    [...$("list").querySelectorAll(".item")].forEach(el => {
      el.onclick = () => selectOrg(el.getAttribute("data-id"));
    });
  }
  $("search").oninput = renderOrgList;

  async function refreshOrgs(){
    $("listMsg").textContent = "Cargando organizaciones...";
    const { data, error } = await sb.from("organizations")
      .select("id, name, plan, subscription_status, current_period_end, employee_limit, notes, created_at")
      .order("created_at", { ascending:false });

    if(error){ $("listMsg").textContent = "Error: " + error.message; return; }
    orgs = data || [];
    $("listMsg").textContent = orgs.length ? "" : "No hay organizaciones.";
    renderOrgList();
    if(selectedOrg){
      const again = orgs.find(x => x.id===selectedOrg.id);
      if(again) selectOrg(again.id);
    }
  }

  function selectOrg(id){
    selectedOrg = orgs.find(o => o.id===id) || null;
    $("btnSaveOrg").disabled = !selectedOrg;

    if(!selectedOrg) return;

    $("org_name").value = selectedOrg.name || "";
    $("org_plan").value = selectedOrg.plan || "basic";
    $("org_status").value = selectedOrg.subscription_status || "trial";
    $("org_emp_limit").value = selectedOrg.employee_limit ?? 50;
    $("org_period_end").value = selectedOrg.current_period_end || "";
    $("org_notes").value = selectedOrg.notes || "";
    $("orgMeta").textContent = "Org ID: " + selectedOrg.id;

    renderOrgList();
    refreshFlags();
  }

  $("btnSaveOrg").onclick = async () => {
    if(!selectedOrg) return;
    $("orgMsg").textContent = "Guardando...";

    const payload = {
      name: $("org_name").value.trim() || null,
      plan: $("org_plan").value,
      subscription_status: $("org_status").value,
      employee_limit: parseInt($("org_emp_limit").value || "0", 10) || 0,
      current_period_end: $("org_period_end").value || null,
      notes: $("org_notes").value.trim() || null
    };

    const { data: before } = await sb.from("organizations")
      .select("plan,subscription_status,employee_limit,current_period_end,notes,name")
      .eq("id", selectedOrg.id).single();

    const { error } = await sb.from("organizations").update(payload).eq("id", selectedOrg.id);
    if(error){ $("orgMsg").textContent = "Error: " + error.message; return; }

    await sb.from("dtc_ceo_audit_logs").insert([{
      actor_user_id: session.user.id,
      action: "org_update",
      target_table: "organizations",
      target_id: selectedOrg.id,
      organization_id: selectedOrg.id,
      before: before || null,
      after: payload
    }]);

    $("orgMsg").textContent = "Guardado ✅";
    await refreshOrgs();
  };

  async function refreshFlags(){ /* (igual que antes) */ }
  async function refreshBacklog(){ /* (igual que antes) */ }
  async function refreshCEOs(){ /* (igual que antes) */ }

  (async () => {
    const ok = await requireCEO();
    if(!ok) return;
    setTab("tabOrgs");
    await refreshOrgs();
  })();
</script>
</body>
</html>
